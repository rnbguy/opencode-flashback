name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2
        with:
          bun-version: "1.3"

      - name: install
        run: bun install --frozen-lockfile

      - name: setup ollama
        shell: bash
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 2
          ollama pull embeddinggemma:latest && ollama pull kimi-k2.5:cloud

      - name: biome check
        run: bunx biome check .

      - name: typecheck
        run: bun run typecheck

      - name: build
        run: bun run build

      - name: test
        run: bun test

      - name: coverage gate
        shell: bash
        run: |
          bun test --coverage 2>&1 | tee coverage-output.txt
          AVG=$(awk -F'|' '/^ src\//{gsub(/ /,"",$3); sum+=$3; n++} END{if(n>0) printf "%.0f", sum/n; else print 0}' coverage-output.txt)
          echo "Average line coverage: ${AVG}%"
          if [ "$AVG" -lt 82 ]; then
            echo "ERROR: Coverage ${AVG}% is below 82% threshold"
            exit 1
          fi

      - name: check tarball size
        shell: bash
        run: |
          TARBALL=$(npm pack --quiet 2>/dev/null | tail -1)
          SIZE=$(wc -c < "$TARBALL" | tr -d ' ')
          echo "Tarball: $TARBALL ($SIZE bytes)"
          rm -f "$TARBALL"
          if [ "$SIZE" -gt 5242880 ]; then
            echo "ERROR: Tarball exceeds 5MB limit"
            exit 1
          fi
