name: e2e

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  e2e:
    name: e2e tests
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama
        ports:
          - 11434:11434

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      - name: install
        run: bun install --frozen-lockfile

      - name: pull ollama models
        run: |
          curl -sf http://localhost:11434/api/pull -d '{"name":"embeddinggemma:latest"}' > /dev/null
          curl -sf http://localhost:11434/api/pull -d '{"name":"kimi-k2.5:cloud"}' > /dev/null

      - name: build
        run: bun run build

      - name: e2e tests
        run: bun test test/e2e/lifecycle.test.ts
