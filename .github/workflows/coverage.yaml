name: coverage

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama
        ports:
          - 11434:11434

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3"

      - name: install
        run: bun install --frozen-lockfile

      - name: pull ollama models
        run: |
          curl -sf http://localhost:11434/api/pull -d '{"name":"embeddinggemma:latest"}' > /dev/null
          curl -sf http://localhost:11434/api/pull -d '{"name":"kimi-k2.5:cloud"}' > /dev/null

      - name: build
        run: bun run build

      - name: test with coverage
        run: bun run test:coverage

      - name: filter lcov to src only
        run: |
          awk '/^SF:/{p=($0 ~ /\/src\//)} p' coverage/lcov.info > coverage/lcov-filtered.info
          mv coverage/lcov-filtered.info coverage/lcov.info

      - uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
